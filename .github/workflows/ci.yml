name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck all shell scripts
        run: |
          shopt -s globstar nullglob
          scripts=(.github/hooks/prevent-trunk-commit .github/hooks/pre-commit .github/hooks/pre-push tools/**/*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          # -S warning: info-level SC2016 fires on tools/verify-manifest.sh's
          # intentionally single-quoted backtick patterns (no expansion is
          # wanted there); real bugs still fail at warning/error severity.
          shellcheck -S warning "${scripts[@]}"

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
      - name: Install pytest (pre-push.bats invokes the pre-push hook, which needs it)
        run: pip install pytest pytest-cov pyyaml
      - name: Run hook tests
        run: bats .github/hooks/tests/
      - name: Run harness-link tests
        run: bats tools/tests/harness-link.bats

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install pytest pytest-cov pyyaml
      - name: Run config_loader tests (>=80% coverage required)
        run: |
          cd patterns/logging
          pytest test_config_loader.py --cov=config_loader --cov-fail-under=80 -v

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --offline
            '**/*.md'
          fail: true

  manifest-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify MANIFEST.md against actual files
        run: bash tools/verify-manifest.sh

  sample-project-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simulate a fresh project consuming the harness via harness-link.sh
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          cp -r examples/sample-project/. "$TMP"/
          git init --quiet "$TMP"
          bash tools/setup/harness-link.sh "$TMP" --with-hook
          (cd "$TMP" && bash verify.sh)
